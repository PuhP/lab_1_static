{% extends "base.html" %}
{% block content %}
<h2 class="mt-4">Проверка номера телефона</h2>

<form method="POST" class="mt-3">
    <div class="mb-3">
        <label class="form-label">Введите номер:</label>
        <input type="text" name="phone" value="{{ phone }}" 
               class="form-control {% if error_msg %}is-invalid{% endif %}">
        
        {% if error_msg %}
            <div class="invalid-feedback">
                {{ error_msg }}
            </div>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-primary">Проверить</button>
</form>

{% if formatted_phone %}
    <div class="alert alert-success mt-3">
        Успех! Отформатированный номер: <strong>{{ formatted_phone }}</strong>
    </div>
{% endif %}
{% endblock %}
